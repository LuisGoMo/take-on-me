<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take on me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="atmosphere" class="atmosphere" aria-hidden="true">
    <div class="atmosphere__veil"></div>
    <div id="stars" class="atmosphere__stars"></div>
  </div>

  <header class="intro">
    <div class="intro__panel">
     <!--<p class="intro__eyebrow">A Small Memory Reel</p>--> 
      <h1>¿Quieres jugar un juego?</h1>
      <p class="intro__text">
        <!-- If you choose yes, the music starts and the memories appear one by one. -->
      </p>
      <div id="choice-row" class="choice-row">
        <button id="no-button" class="choice-button choice-button--ghost" type="button">No</button>
        <button id="yes-button" class="choice-button choice-button--yes" type="button">Sí</button>
      </div>
     <!-- <p id="status" class="status" aria-live="polite">Add your song to <code>audio/song.mp3</code> if you have not already.</p>-->
    </div>
  </header>

  <main id="story" class="story story--hidden"></main>

  <audio id="song" preload="auto">
    <source src="audio/song.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script src="script.js"></script>
</body>
</html>
